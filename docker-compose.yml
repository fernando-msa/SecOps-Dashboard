version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: secops-postgres
    environment:
      POSTGRES_USER: secops
      POSTGRES_PASSWORD: secops_secret
      POSTGRES_DB: secops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secops -d secops_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
